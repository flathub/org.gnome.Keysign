id: org.gnome.Keysign
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: gnome-keysign
copy-icon: true
finish-args:
  - --share=ipc
  - --socket=x11
  # We are not Wayland ready yet, because of Twisted: https://github.com/flathub/org.gnome.Keysign/issues/14
  #- --socket=fallback-x11
  #- --socket=wayland
  - --share=network
  - --system-talk-name=org.freedesktop.Avahi
  - --system-talk-name=org.bluez
  - --allow=bluetooth
  - --device=all
  - --filesystem=~/.gnupg:ro
  - --filesystem=xdg-run/gnupg:ro
  # We use this folder to support dragging and dropping emails into the app
  # There might be a copy-and-paste portal: https://github.com/flatpak/xdg-desktop-portal/issues/99
  # And Evolution might be capable of sending the whole email via the clipboard: https://gitlab.gnome.org/GNOME/evolution/issues/618
  # Until any of that has landed, we make the folder read-only.
  - --filesystem=xdg-cache/evolution/tmp:ro
  - --filesystem=~/.claws-mail/tmp/:ro

# We're waiting for webcam support: https://github.com/flatpak/xdg-desktop-portal/issues/38;
# we use --device=all meanwhile. We do network, because we're opening a port.
build-options:
  env:
    V: '1'
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/aclocal
  - /man
  - /share/man
  - /share/gtk-doc
  - /share/vala
  - "*.la"
  - "*.a"
modules:
  - name: swig
    config-opts:
      - "--without-boost"
      - "--without-pcre"
    sources:
      - type: archive
        url: http://prdownloads.sourceforge.net/swig/swig-3.0.12.tar.gz
        sha256: 7cf9f447ae7ed1c51722efc45e7f14418d15d7a1e143ac9f09a668999f4fc94d

  - name: python3-dbus-python
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} "dbus-python" --no-build-isolation
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/b1/5c/ccfc167485806c1936f7d3ba97db6c448d0089c5746ba105b6eb22dba60e/dbus-python-1.2.18.tar.gz
        sha256: 92bdd1e68b45596c833307a5ff4b217ee6929a1502f5341bae28fd120acf7260



  - name: gst-plugins-bad
    buildsystem: meson
    config-opts:
        - -Dexamples=disabled
        - -Daom=disabled
        - -Davtp=disabled
        - -Dbs2b=disabled
        - -Dchromaprint=disabled
        - -Dcolormanagement=disabled
        - -Dcuda=disabled
        - -Dcurl-ssh2=disabled
        - -Dcurl=disabled
        - -Dd3dvideosink=disabled
        - -Ddash=disabled
        - -Ddc1394=disabled
        - -Ddecklink=disabled
        - -Ddirectfb=disabled
        - -Ddirectsound=disabled
        - -Ddoc=disabled
        - -Ddtls=disabled
        - -Ddts=disabled
        - -Dfaac=disabled
        - -Dfbdev=disabled
        - -Dfestival=disabled
        - -Dflite=disabled
        - -Dfluidsynth=disabled
        - -Dgme=disabled
        - -Dgsm=disabled
        - -Diqa=disabled
        - -Dladspa=disabled
        - -Dlibde265=disabled
        - -Dlibmms=disabled
        - -Dlv2=disabled
        - -Dmagicleap=disabled
        - -Dmicrodns=disabled
        - -Dmodplug=disabled
        - -Dmpeg2enc=disabled
        - -Dmplex=disabled
        - -Dmsdk=disabled
        - -Dmusepack=disabled
        - -Dneon=disabled
        - -Dnvcodec=disabled
        - -Dnvdec=disabled
        - -Dnvenc=disabled
        - -Dofa=disabled
        - -Dopenal=disabled
        - -Dopencv=disabled
        - -Dopenexr=disabled
        - -Dopenh264=disabled
        - -Dopenmpt=disabled
        - -Dopenni2=disabled
        - -Dopensles=disabled
        - -Dresindvd=disabled
        - -Drsvg=disabled
        - -Drtmp=disabled
        - -Drtp=disabled
        - -Dsbc=disabled
        - -Dsctp=disabled
        - -Dsndfile=disabled
        - -Dsoundtouch=disabled
        - -Dspandsp=disabled
        - -Dsrt=disabled
        - -Dsvthevcenc=disabled
        - -Dteletext=disabled
        - -Dtinyalsa=disabled
        - -Dva=disabled
        - -Dvaacenc=disabled
        - -Dvdpau=disabled
        - -Dvoaacenc=disabled
        - -Dvoamrwbenc=disabled
        - -Dvulkan=disabled
        - -Dwasapi=disabled
        - -Dwasapi2=disabled
        - -Dwebp=disabled
        - -Dwebrtcdsp=disabled
        - -Dwebrtc=disabled
        - -Dwildmidi=disabled
        - -Dwinks=disabled
        - -Dwinscreencap=disabled
        - -Dwpe=disabled
        - -Dx265=disabled
        - -Dzbar=enabled
        - -Dzxing=enabled
    sources:
      - type: archive
        url: https://gstreamer.freedesktop.org/src/gst-plugins-bad/gst-plugins-bad-1.18.6.tar.xz
        sha512: 78731e0db04afd3dcdd5c5ea84df4e096a5db121fd9cb6eb79197844482a3b36b2764a664f171f80c809e6182ceae2350113d47f3f7c684d2d88f752bc092baf
        x-checker-data:
          type: anitya
          project-id: 21849
          url-template: https://gstreamer.freedesktop.org/src/gst-plugins-bad/gst-plugins-bad-$version.tar.xz
          versions:
            <: 1.25.0

    modules:
      - name: zxing
        config-opts:
        - "-DBUILD_SHARED_LIBS=ON"
        - "-DBUILD_EXAMPLES=OFF"
        - "-DBUILD_BLACKBOX_TESTS=OFF"
        - "-DBUILD_UNIT_TESTS=OFF"
        buildsystem: cmake-ninja
        builddir: true
        sources:
          - type: git
            url: https://github.com/zxing-cpp/zxing-cpp
            tag: "v1.4.0"
            commit: f89db69e34543c508f80e807535dab3012eea7ad
            x-checker-data:
              type: anitya
              project-id: 376699,
              stable-only: true,
              url-template: "https://github.com/zxing-cpp/zxing-cpp/archive/v$version.tar.gz"
              versions:
                "<": 2

      - name: zbar
        config-opts:
        - "--disable-doc"
        - "--disable-video"
        - "--with-python=python3"
        - "--without-dbus"
        - "--without-xv"
        - "--without-gtk"
        - "--without-qt"
        sources:
          - type: archive
            url: https://www.linuxtv.org/downloads/zbar/zbar-0.23.90.tar.gz
            sha256: ff857dd7e3dbe043dac3765b5182c91dfd0477800713a75d15287d797cee60fa
        modules:
          - name: imagemagick
            config-opts:
              - --enable-shared
              - --disable-static
              - --disable-docs
              - --with-modules
              - --with-threads
            sources:
              - type: archive
                url: https://github.com/ImageMagick/ImageMagick/archive/7.1.2-12.tar.gz
                sha512: 6a1de1e41ccddaee3832876b406ffc444c4cadfe79124879f85e9ac0eae4edf956111d08f9004548b1c0b2f19117fa6fa4bceae82248826a11919e195df939e5
                x-checker-data:
                  type: anitya
                  project-id: 1372
                  stable-only: true
                  url-template: https://github.com/ImageMagick/ImageMagick/archive/$version.tar.gz
            cleanup:
              - /bin/*-config

  - name: gpgme
    sources:
      - type: archive
        url: https://www.gnupg.org/ftp/gcrypt/gpgme/gpgme-1.24.3.tar.bz2
        sha512: 3b5fc22a2f83576058ac14e744333f46df362b39f742d6c9e54a5a66828194a1312f5f365bdc15683e148821f5d591fa92a2daad83fc116f65dccf14e817ca48
        x-checker-data:
          type: anyita
          project-id: 1239
          stable-only: True
          url-template: https://gnupg.org/ftp/gcrypt/gpgme/gpgme-$version.tar.bz2

  - name: bluez
    config-opts:
    - "--disable-datafiles"
    - "--disable-manpages"
    - "--disable-systemd"
    - "--enable-experimental"
    - "--enable-library"
    - "--disable-client"
    - "--disable-mesh"
    - "--disable-tools"
    - "--disable-monitor"
    - "--disable-udev"
    - "--prefix=/app"
    - "--sysconfdir=/app/etc"
    sources:
    - type: archive
      url: https://mirrors.edge.kernel.org/pub/linux/bluetooth/bluez-5.64.tar.xz
      sha256: ae437e65b6b3070c198bc5b0109fe9cdeb9eaa387380e2072f9de65fe8a1de34

    modules:
    - name: libical
      cleanup:
      - "/lib/cmake"
      buildsystem: cmake
      config-opts:
      - "-DCMAKE_INSTALL_LIBDIR:PATH=/app/lib"
      - "-DBUILD_SHARED_LIBS:BOOL=ON"
      sources:
      - type: archive
        url: https://github.com/libical/libical/archive/v3.0.14.tar.gz
        sha256: 4284b780356f1dc6a01f16083e7b836e63d3815e27ed0eaaad684712357ccc8f


  # flatpak-pip-generator --runtime org.gnome.Sdk//40 requests qrcode incremental m2r setuptools_scm \
  # Automat cryptography==3.3.2 "twisted[tls]" future humanize magic-wormhole \
  # BabelGladeExtractor PyBluez
  # as parsing requirements.txt doesn't seem to work O_o
  # cryptography versions newer than 3.3.2 requires additional rust dependecies, start by using this version for now
  # PyBluez has been changed to the latest dev version to fix issue with "use_2to3" https://github.com/pybluez/pybluez/issues/431#issuecomment-1107884273
  - python3-modules.json

  - name: gnome-keysign
    no-autogen: true
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} .
    sources:
      - type: archive
        url: https://gitlab.gnome.org/GNOME/gnome-keysign/-/archive/1.2.0/gnome-keysign-1.2.0.tar.gz
        sha256: 81e404a535ea94e5dde699ea386d795cfc1494bbcd6f28fb6940b9fa7da9f5b1

      - type: patch
        path: 0001-setup-import-translate_appdata_file-and-translate_de.patch
