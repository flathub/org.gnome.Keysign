id: org.gnome.Keysign
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: gnome-keysign
copy-icon: true
finish-args:
  - --share=ipc
  - --socket=x11
  # We are not Wayland ready yet, because of Twisted: https://github.com/flathub/org.gnome.Keysign/issues/14
  #- --socket=fallback-x11
  #- --socket=wayland
  - --share=network
  - --system-talk-name=org.freedesktop.Avahi
  - --system-talk-name=org.bluez
  - --allow=bluetooth
  - --device=all
  - --filesystem=~/.gnupg:ro
  - --filesystem=xdg-run/gnupg:ro
  # We use this folder to support dragging and dropping emails into the app
  # There might be a copy-and-paste portal: https://github.com/flatpak/xdg-desktop-portal/issues/99
  # And Evolution might be capable of sending the whole email via the clipboard: https://gitlab.gnome.org/GNOME/evolution/issues/618
  # Until any of that has landed, we make the folder read-only.
  - --filesystem=xdg-cache/evolution/tmp:ro
  - --filesystem=~/.claws-mail/tmp/:ro

# We're waiting for webcam support: https://github.com/flatpak/xdg-desktop-portal/issues/38;
# we use --device=all meanwhile. We do network, because we're opening a port.
build-options:
  env:
    V: '1'
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/aclocal
  - /man
  - /share/man
  - /share/gtk-doc
  - /share/vala
  - "*.la"
  - "*.a"
modules:
  - name: python3-dbus-python
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} "dbus-python" --no-build-isolation
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/b1/5c/ccfc167485806c1936f7d3ba97db6c448d0089c5746ba105b6eb22dba60e/dbus-python-1.2.18.tar.gz
        sha256: 92bdd1e68b45596c833307a5ff4b217ee6929a1502f5341bae28fd120acf7260



  - name: gst-plugins-bad
    #disabled: true
    buildsystem: meson
    config-opts:
        - -Dzbar=enabled
        - -Dzxing=enabled
        - -Dgpl=enabled
        - -Dexamples=disabled
        - -Dtests=disabled
        - -Dexamples=disabled
        - -Ddoc=disabled
        - -Dpackage-origin="gnome-keysign-flatpak-manifest"
        # Strange that we have to set libdir ourselves; the flatpak-meson is patched, I thought
        - -Dlibdir=lib

        ## We don't need those plugins
        - -Daom=disabled
        - -Davtp=disabled
        - -Dbs2b=disabled
        - -Dchromaprint=disabled
        - -Dcolormanagement=disabled
        - -Dcurl-ssh2=disabled
        - -Dcurl=disabled
        - -Dd3dvideosink=disabled
        - -Ddash=disabled
        - -Ddc1394=disabled
        - -Ddecklink=disabled
        - -Ddirectfb=disabled
        - -Ddirectsound=disabled
        - -Ddoc=disabled
        - -Ddtls=disabled
        - -Ddts=disabled
        - -Dfaac=disabled
        - -Dfbdev=disabled
        - -Dfestival=disabled
        - -Dflite=disabled
        - -Dfluidsynth=disabled
        - -Dgme=disabled
        - -Dgsm=disabled
        - -Diqa=disabled
        - -Dladspa=disabled
        - -Dlibde265=disabled
        - -Dlv2=disabled
        - -Dmagicleap=disabled
        - -Dmicrodns=disabled
        - -Dmodplug=disabled
        - -Dmpeg2enc=disabled
        - -Dmplex=disabled
        - -Dmsdk=disabled
        - -Dmusepack=disabled
        - -Dneon=disabled
        - -Dnvcodec=disabled
        - -Dopenal=disabled
        - -Dopencv=disabled
        - -Dopenexr=disabled
        - -Dopenh264=disabled
        - -Dopenmpt=disabled
        - -Dopenni2=disabled
        - -Dopensles=disabled
        - -Dresindvd=disabled
        - -Drsvg=disabled
        - -Drtmp=disabled
        - -Drtp=disabled
        - -Dsbc=disabled
        - -Dsctp=disabled
        - -Dsndfile=disabled
        - -Dsoundtouch=disabled
        - -Dspandsp=disabled
        - -Dsrt=disabled
        - -Dsvthevcenc=disabled
        - -Dteletext=disabled
        - -Dtinyalsa=disabled
        - -Dva=disabled
        - -Dvoaacenc=disabled
        - -Dvoamrwbenc=disabled
        - -Dvulkan=disabled
        - -Dwasapi=disabled
        - -Dwasapi2=disabled
        - -Dwebp=disabled
        - -Dwebrtcdsp=disabled
        - -Dwebrtc=disabled
        - -Dwildmidi=disabled
        - -Dwinks=disabled
        - -Dwinscreencap=disabled
        - -Dwpe=disabled
        - -Dx265=disabled

    sources:
      - type: archive
        url: https://gstreamer.freedesktop.org/src/gst-plugins-bad/gst-plugins-bad-1.24.12.tar.xz
        sha512: 00212ab3f80f4dd3a007e0d44245196ddcf6cf91b0bb4a39bc12da32d5680ba12a9132a500d520ca6973375c2480f7ff07138aa34a602631186450b83942574e
        x-checker-data:
          type: anitya
          project-id: 21849
          url-template: https://gstreamer.freedesktop.org/src/gst-plugins-bad/gst-plugins-bad-$version.tar.xz
          versions:
            <: 1.25.0

    run-tests: True
    test-commands:
      - env PAGER=cat   gst-inspect-1.0  zbar
    post-install:
      - env PAGER=cat   gst-inspect-1.0  frei0r
      - env PAGER=cat   gst-inspect-1.0  zbar

    modules:
      - name: zxing
        config-opts:
        - -DCMAKE_BUILD_TYPE=RelWithDebug
        - "-DBUILD_SHARED_LIBS=ON"
        - "-DBUILD_EXAMPLES=OFF"
        - "-DBUILD_BLACKBOX_TESTS=OFF"
        - "-DBUILD_UNIT_TESTS=OFF"
        # It installs in lib64 unless we overwrite libdir
        - "-DCMAKE_INSTALL_LIBDIR=lib"
        buildsystem: cmake-ninja
        builddir: true
        sources:
          - type: git
            url: https://github.com/zxing-cpp/zxing-cpp
            tag: "v1.4.0"
            commit: f89db69e34543c508f80e807535dab3012eea7ad
            x-checker-data:
              type: anitya
              project-id: 376699,
              stable-only: true,
              url-template: "https://github.com/zxing-cpp/zxing-cpp/archive/v$version.tar.gz"
              versions:
                "<": 2

      - name: zbar
        config-opts:
        - "--disable-doc"
        - "--disable-video"
        - "--with-python=python3"
        - "--without-dbus"
        - "--without-xv"
        - "--without-gtk"
        - "--without-qt"
        sources:
          - type: archive
            url: https://www.linuxtv.org/downloads/zbar/zbar-0.23.93.tar.gz
            sha512: 61ac8d50c5d236f996cf60221198e3b9357329a9ecda67b29495001f59055ae0124fb1dd70c6ec075eb96eb2ef42c22604a447c9203126f9d0f8108a4e268056
            x-checker-data:
              type: json
              url: https://api.github.com/repos/mchehab/zbar/releases/latest
              version-query: ".tag_name"
              url-query: ".tag_name | sub(\"^\"; \"https://linuxtv.org/downloads/zbar/zbar-\") | sub(\"$\"; \".tar.gz\")"

        modules:
          - name: imagemagick
            config-opts:
              - --enable-shared
              - --disable-static
              - --disable-docs
              - --with-modules
              - --with-threads
            sources:
              - type: archive
                url: https://github.com/ImageMagick/ImageMagick/archive/7.1.2-12.tar.gz
                sha512: 6a1de1e41ccddaee3832876b406ffc444c4cadfe79124879f85e9ac0eae4edf956111d08f9004548b1c0b2f19117fa6fa4bceae82248826a11919e195df939e5
                x-checker-data:
                  type: anitya
                  project-id: 1372
                  stable-only: true
                  url-template: https://github.com/ImageMagick/ImageMagick/archive/$version.tar.gz
            cleanup:
              - /bin/*-config

  - name: gpgme
    sources:
      - type: archive
        url: https://www.gnupg.org/ftp/gcrypt/gpgme/gpgme-1.24.3.tar.bz2
        sha512: 3b5fc22a2f83576058ac14e744333f46df362b39f742d6c9e54a5a66828194a1312f5f365bdc15683e148821f5d591fa92a2daad83fc116f65dccf14e817ca48
        x-checker-data:
          type: anyita
          project-id: 1239
          stable-only: True
          url-template: https://gnupg.org/ftp/gcrypt/gpgme/gpgme-$version.tar.bz2
    modules:
      - name: swig
        config-opts:
          - "--without-boost"
          - "--without-pcre"
          - "--without-perl5"
          - "--without-javascript"
        sources:
          - type: archive
            url: http://prdownloads.sourceforge.net/swig/swig-3.0.12.tar.gz
            sha256: 7cf9f447ae7ed1c51722efc45e7f14418d15d7a1e143ac9f09a668999f4fc94d


  - name: bluez
    config-opts:
    - "--disable-datafiles"
    - "--disable-manpages"
    - "--disable-systemd"
    - "--enable-experimental"
    - "--enable-library"
    - "--disable-client"
    - "--disable-mesh"
    - "--disable-tools"
    - "--disable-monitor"
    - "--disable-udev"
    - "--prefix=/app"
    - "--sysconfdir=/app/etc"
    sources:
    - type: archive
      url: https://mirrors.edge.kernel.org/pub/linux/bluetooth/bluez-5.64.tar.xz
      sha512: f11f9974b29c5c6fce3890d7e42425c1cb02e42c1b8f49c5cc4b249234e67b64317d0e5e82721e2fbf1b53269c8569a9c869d59ce42b5e927f6622f0753e53cd
      x-checker-data:
        type: anitya
        project-id: 10029
        url-template: http://www.kernel.org/pub/linux/bluetooth/bluez-$version.tar.xz

    modules:
      - name: libical
        cleanup:
          - /lib/cmake
        buildsystem: cmake-ninja
        config-opts:
          - -DCMAKE_BUILD_TYPE=RelWithDebug
          - -DCMAKE_INSTALL_LIBDIR=lib
          - -DBUILD_SHARED_LIBS:BOOL=ON
          - -DICAL_GLIB=true
          - -DGOBJECT_INTROSPECTION=true
          - -DICAL_GLIB_VAPI=true
          - -DICAL_BUILD_DOCS=false
        sources:
          - type: archive
            url: https://github.com/libical/libical/releases/download/v3.0.20/libical-3.0.20.tar.gz
            sha512: 2506320240ba0e4287b6ef1b90b653eacd51105d392b91f8c772f3b0745fecbf55eecfe81f89413cc56106b71ccca780754df31f5190ffce6c372126e27bf1da
            x-checker-data:
              type: anitya
              project-id: 1637
              url-template: https://github.com/libical/libical/releases/download/v$version/libical-$version.tar.gz

  # flatpak-pip-generator --runtime org.gnome.Sdk//40 requests qrcode incremental m2r setuptools_scm \
  # Automat cryptography==3.3.2 "twisted[tls]" future humanize magic-wormhole \
  # BabelGladeExtractor PyBluez
  # as parsing requirements.txt doesn't seem to work O_o
  # cryptography versions newer than 3.3.2 requires additional rust dependecies, start by using this version for now
  # PyBluez has been changed to the latest dev version to fix issue with "use_2to3" https://github.com/pybluez/pybluez/issues/431#issuecomment-1107884273
  - python3-modules.json

  # This is quick-fix to make it work. We should not simply install over the existing twisted but rather update all those deps
  - python3-twisted.yaml
  - python3-cryptography38.yaml
  - python3-pyopenssl.yaml
  - python3-wormhole.yaml

  - name: gnome-keysign
    no-autogen: true
    buildsystem: simple
    build-commands:
      - pip3 freeze
      - desktop-file-edit --set-key=Exec --set-value=/app/bin/gnome-keysign  ./data/org.gnome.Keysign.raw.desktop
      - pip3 install --verbose --no-build-isolation  --exists-action=i --no-index --find-links=\"file://${PWD}\"  --prefix=${FLATPAK_DEST} .
    sources:
      - type: archive
        url: https://gitlab.gnome.org/GNOME/gnome-keysign/-/archive/1.2.0/gnome-keysign-1.2.0.tar.gz
        sha256: 81e404a535ea94e5dde699ea386d795cfc1494bbcd6f28fb6940b9fa7da9f5b1

      - type: patch
        path: 0001-setup-import-translate_appdata_file-and-translate_de.patch
